---
- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks: 
    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5013/workspace/mavansipipe/target/mavansipipe.war"
        dest: "opt/tomcat/webapps/mavansipipe.war"
        remote_src: no
        
    - name: Restart Tomcat
      shell: |
        /opt/tomcat/bin/shutdown.sh || true
        /opt/tomcat/bin/startup.sh

